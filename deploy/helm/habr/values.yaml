# Default values for habr umbrella chart

# --- Application Services ---

gateway:
  replicaCount: 1
  image:
    repository: ghcr.io/sonofstevejobs/habr-gateway
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
  env:
    GATEWAY_HTTP_PORT: ":8080"
    AUTH_GRPC_ADDR: "habr-auth:50051"
    ARTICLE_GRPC_ADDR: "habr-article:50052"
    LOGGER_LEVEL: "info"
    LOGGER_AS_JSON: "true"
    OTEL_COLLECTOR_ENDPOINT: "habr-jaeger-collector:4317"
  envFromSecret:
    JWT_SECRET: habr-secrets

auth:
  replicaCount: 1
  image:
    repository: ghcr.io/sonofstevejobs/habr-auth
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 50051
  migration:
    enabled: true
  env:
    AUTH_GRPC_PORT: ":50051"
    REDIS_ADDR: "habr-redis-master:6379"
    KAFKA_BROKERS: "habr-kafka:9092"
    LOGGER_LEVEL: "info"
    LOGGER_AS_JSON: "true"
    OTEL_COLLECTOR_ENDPOINT: "habr-jaeger-collector:4317"
  envFromSecret:
    DB_URI: habr-secrets
    JWT_SECRET: habr-secrets

article:
  replicaCount: 1
  image:
    repository: ghcr.io/sonofstevejobs/habr-article
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 50052
  migration:
    enabled: true
  env:
    ARTICLE_GRPC_PORT: ":50052"
    REDIS_ADDR: "habr-redis-master:6379"
    CACHE_ARTICLES_TTL: "5m"
    LOGGER_LEVEL: "info"
    LOGGER_AS_JSON: "true"
    OTEL_COLLECTOR_ENDPOINT: "habr-jaeger-collector:4317"
  envFromSecret:
    DB_URI: habr-secrets

notification:
  replicaCount: 1
  image:
    repository: ghcr.io/sonofstevejobs/habr-notification
    tag: latest
    pullPolicy: IfNotPresent
  migration:
    enabled: true
  env:
    KAFKA_BROKERS: "habr-kafka:9092"
    KAFKA_TOPIC: "user-registered"
    KAFKA_GROUP_ID: "notification-service"
    LOGGER_LEVEL: "info"
    LOGGER_AS_JSON: "true"
    OTEL_COLLECTOR_ENDPOINT: "habr-jaeger-collector:4317"
  envFromSecret:
    DB_URI: habr-secrets

# --- Infrastructure ---

postgresql-auth:
  enabled: true
  auth:
    username: auth_user
    password: auth_password
    database: auth_db
  primary:
    persistence:
      size: 1Gi

postgresql-article:
  enabled: true
  auth:
    username: article_user
    password: article_password
    database: article_db
  primary:
    persistence:
      size: 1Gi

postgresql-notification:
  enabled: true
  auth:
    username: notification_user
    password: notification_password
    database: notification_db
  primary:
    persistence:
      size: 1Gi

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false

kafka:
  enabled: true
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
  controller:
    replicaCount: 1
  provisioning:
    enabled: true
    topics:
      - name: user-registered
        partitions: 1
        replicationFactor: 1

elasticsearch:
  enabled: true
  master:
    replicaCount: 1
    persistence:
      size: 5Gi

kube-prometheus-stack:
  enabled: true
  grafana:
    enabled: true

jaeger:
  enabled: true
  collector:
    service:
      otlp:
        grpc:
          port: 4317
