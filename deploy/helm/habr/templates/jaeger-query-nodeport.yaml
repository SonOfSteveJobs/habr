{{- if .Values.jaeger.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-jaeger-query
  labels:
    app.kubernetes.io/name: jaeger-query
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: NodePort
  ports:
    - port: 16686
      targetPort: 16686
      nodePort: 30031
      name: query
  selector:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
